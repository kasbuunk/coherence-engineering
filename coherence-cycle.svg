<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 760" width="1100" height="760">
  <defs>
    <filter id="glow"><feGaussianBlur stdDeviation="2.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="haloGlow"><feGaussianBlur stdDeviation="5"/></filter>
    <marker id="arrowDim" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <path d="M0,1 L8,3.5 L0,6" fill="#2a3a4a"/></marker>
    <marker id="arrowEntry" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <path d="M0,1 L8,3.5 L0,6" fill="#4488cc"/></marker>
    <marker id="arrowBlue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="none" stroke="#66aadd" stroke-width="1"/></marker>
  </defs>

  <style>
    /* 24s loop — AI Readiness is entry, then 4-step cycle repeats
       Stage 1  AI Readiness       0-4s     0%-16.7%
       Stage 2  Measure            4-8s    16.7%-33.3%
       Stage 3  Detect             8-13s   33.3%-54.2%
       Stage 4  Resolve           13-18s   54.2%-75%
       Stage 5  Implement         18-22s   75%-91.7%
       Stage 6  Repeat/pause      22-24s   91.7%-100% */

    text{font-family:'Helvetica Neue',Arial,sans-serif}
    .node-circle{fill:#1a2233;stroke-width:2}
    .node-label{font-size:12px;fill:#8899aa;text-anchor:middle;font-weight:400}
    .node-icon{text-anchor:middle;font-weight:400}
    .path-label{font-size:11px;fill:#aabbcc;text-anchor:middle}

    /* ---- AI READINESS (entry, outside cycle) ---- */
    @keyframes aiEntry{0%{opacity:0}2%{opacity:0}4%{opacity:1}14%{opacity:1}16.7%{opacity:0.25}100%{opacity:0.25}}
    #ai-readiness{animation:aiEntry 24s infinite}
    @keyframes entryArrow{0%{opacity:0}12%{opacity:0}15%{opacity:0.8}20%{opacity:0.2}100%{opacity:0.2}}
    #entry-arrow{animation:entryArrow 24s infinite}

    /* ---- NODE APPEARANCES ---- */
    @keyframes n1{0%{opacity:0}2%{opacity:0}4%{opacity:1}96%{opacity:1}99%{opacity:0}100%{opacity:0}}
    @keyframes n2{0%{opacity:0}3.5%{opacity:0}5.5%{opacity:1}96%{opacity:1}99%{opacity:0}100%{opacity:0}}
    @keyframes n3{0%{opacity:0}5%{opacity:0}7%{opacity:1}96%{opacity:1}99%{opacity:0}100%{opacity:0}}
    @keyframes n4{0%{opacity:0}6.5%{opacity:0}8.5%{opacity:1}96%{opacity:1}99%{opacity:0}100%{opacity:0}}
    @keyframes n5{0%{opacity:0}8%{opacity:0}10%{opacity:1}96%{opacity:1}99%{opacity:0}100%{opacity:0}}
    #node-code{animation:n1 24s infinite}#node-tests{animation:n2 24s infinite}
    #node-obs{animation:n3 24s infinite}#node-context{animation:n4 24s infinite}
    #node-specs-g{animation:n5 24s infinite}

    /* ---- CYCLE BADGES (bright when active, dim otherwise) ---- */
    @keyframes bMeasure{0%{opacity:0.3}16.7%{opacity:0.3}18%{opacity:1}31%{opacity:1}33.3%{opacity:0.3}100%{opacity:0.3}}
    @keyframes bDetect{0%{opacity:0.3}33.3%{opacity:0.3}35%{opacity:1}52%{opacity:1}54.2%{opacity:0.3}100%{opacity:0.3}}
    @keyframes bResolve{0%{opacity:0.3}54.2%{opacity:0.3}56%{opacity:1}73%{opacity:1}75%{opacity:0.3}100%{opacity:0.3}}
    @keyframes bImplement{0%{opacity:0.3}75%{opacity:0.3}77%{opacity:1}89%{opacity:1}91.7%{opacity:0.3}100%{opacity:0.3}}
    #badge-measure{animation:bMeasure 24s infinite}
    #badge-detect{animation:bDetect 24s infinite}
    #badge-resolve{animation:bResolve 24s infinite}
    #badge-implement{animation:bImplement 24s infinite}

    /* Badge halos */
    @keyframes bhMeasure{0%{opacity:0}16.7%{opacity:0}18%{opacity:0.4}31%{opacity:0.4}33.3%{opacity:0}100%{opacity:0}}
    @keyframes bhDetect{0%{opacity:0}33.3%{opacity:0}35%{opacity:0.4}52%{opacity:0.4}54.2%{opacity:0}100%{opacity:0}}
    @keyframes bhResolve{0%{opacity:0}54.2%{opacity:0}56%{opacity:0.4}73%{opacity:0.4}75%{opacity:0}100%{opacity:0}}
    @keyframes bhImplement{0%{opacity:0}75%{opacity:0}77%{opacity:0.4}89%{opacity:0.4}91.7%{opacity:0}100%{opacity:0}}
    #halo-measure{animation:bhMeasure 24s infinite}
    #halo-detect{animation:bhDetect 24s infinite}
    #halo-resolve{animation:bhResolve 24s infinite}
    #halo-implement{animation:bhImplement 24s infinite}

    /* ---- SPECS DRIFT + STROKE ---- */
    @keyframes specsDrift{
      0%{transform:translate(0,0)}33.3%{transform:translate(0,0)}
      42%{transform:translate(-85px,-45px)}75%{transform:translate(-85px,-45px)}
      81%{transform:translate(0,0)}100%{transform:translate(0,0)}}
    #specs-drift{animation:specsDrift 24s infinite ease-in-out}
    @keyframes specsStroke{
      0%{stroke:#cc8844}33.3%{stroke:#cc8844}38%{stroke:#ff4444}54.2%{stroke:#ff4444}
      57%{stroke:#cc8844}75%{stroke:#cc8844}80%{stroke:#44dd88}90%{stroke:#44dd88}95%{stroke:#cc8844}100%{stroke:#cc8844}}
    #specs-circle{animation:specsStroke 24s infinite}

    /* ---- MEASUREMENT (Stage 2) ---- */
    @keyframes connMeasure{0%{opacity:0}17.5%{opacity:0}20%{opacity:0.6}31%{opacity:0.6}33.3%{opacity:0}100%{opacity:0}}
    @keyframes dashPulse{to{stroke-dashoffset:-20}}
    .conn-measure{stroke:#4488cc;stroke-width:1.5;fill:none;stroke-dasharray:6 4;
      animation:connMeasure 24s infinite,dashPulse 0.8s linear infinite}

    /* ---- DECOHERENCE (Stage 3) ---- */
    @keyframes decoherenceShow{0%{opacity:0}35%{opacity:0}37%{opacity:1}52%{opacity:1}54.2%{opacity:0}100%{opacity:0}}
    #decoherence-group{animation:decoherenceShow 24s infinite}
    .conn-red{stroke:#ff4444;stroke-width:2;fill:none;stroke-dasharray:6 4;animation:dashPulse 0.5s linear infinite}
    .conn-ok{stroke:#4488cc;stroke-width:1.5;fill:none;opacity:0.25}
    @keyframes outlierPulse{0%,100%{opacity:0.6}50%{opacity:1}}
    .outlier-badge{animation:outlierPulse 1.2s ease-in-out infinite}

    /* ---- RESOLUTION (Stage 4) ---- */
    @keyframes resolutionShow{0%{opacity:0}55%{opacity:0}57%{opacity:1}73%{opacity:1}75%{opacity:0}100%{opacity:0}}
    #resolution-group{animation:resolutionShow 24s infinite}
    @keyframes drawPathA{0%{stroke-dashoffset:160}58%{stroke-dashoffset:160}65%{stroke-dashoffset:0}100%{stroke-dashoffset:0}}
    @keyframes drawPathB{0%{stroke-dashoffset:160}63%{stroke-dashoffset:160}70%{stroke-dashoffset:0}100%{stroke-dashoffset:0}}
    .path-a{stroke-dasharray:160;animation:drawPathA 24s infinite}
    .path-b{stroke-dasharray:160;animation:drawPathB 24s infinite}

    /* ---- IMPLEMENT (Stage 5) ---- */
    @keyframes implementShow{0%{opacity:0}76%{opacity:0}78%{opacity:1}89%{opacity:1}91.7%{opacity:0}100%{opacity:0}}
    #implement-group{animation:implementShow 24s infinite}
    .conn-green{stroke:#44dd88;stroke-width:2;fill:none}
    @keyframes badgeGlow{0%,100%{opacity:0.8}50%{opacity:1}}
    .coherent-badge{animation:badgeGlow 1.5s ease-in-out infinite}
  </style>

  <!-- ==================== BACKGROUND ==================== -->
  <rect width="1100" height="760" fill="#0d1117" rx="8"/>

  <!-- Title + progress -->
  <text x="550" y="35" font-size="15" fill="#556677" text-anchor="middle"
    font-weight="300" letter-spacing="3">COHERENCE ENGINEERING CYCLE</text>
  <rect x="200" y="50" width="700" height="2" rx="1" fill="#1a2233"/>
  <rect x="200" y="50" height="2" rx="1" fill="#4488cc" opacity="0.6">
    <animate attributeName="width" values="0;700" dur="24s" repeatCount="indefinite"/>
  </rect>

  <!-- ==================== AI READINESS (entry point, outside cycle) ==================== -->
  <g id="ai-readiness">
    <text x="550" y="90" font-size="18" fill="#ffffff" text-anchor="middle"
      font-weight="300" letter-spacing="1.5">AI Readiness</text>
    <text x="550" y="112" font-size="12" fill="#667788" text-anchor="middle"
      font-weight="300">Prerequisites — artifacts exist and are accessible</text>
  </g>
  <line id="entry-arrow" x1="550" y1="125" x2="550" y2="172" stroke="#4488cc"
    stroke-width="1.5" marker-end="url(#arrowEntry)" opacity="0"/>

  <!--
    ==================== CYCLE DIAMOND ====================
    4 stages in a diamond around the central artifacts.
    Measure (550,195) — top
    Detect (810,400) — right
    Resolve (550,605) — bottom
    Implement (290,400) — left

    Pentagon of artifacts: center (550,400), r=95, node r=28
    Code (550,305)  Tests (640,371)  Obs (609,477)  Context (491,477)  Specs (460,371)
  -->

  <!-- Diamond arrows (always visible, dim) -->
  <line x1="615" y1="213" x2="745" y2="378" stroke="#2a3a4a" stroke-width="1.5" marker-end="url(#arrowDim)"/>
  <line x1="745" y1="422" x2="615" y2="587" stroke="#2a3a4a" stroke-width="1.5" marker-end="url(#arrowDim)"/>
  <line x1="485" y1="587" x2="355" y2="422" stroke="#2a3a4a" stroke-width="1.5" marker-end="url(#arrowDim)"/>
  <line x1="355" y1="378" x2="485" y2="213" stroke="#2a3a4a" stroke-width="1.5" marker-end="url(#arrowDim)"/>

  <!-- Badge halos (glow when active) -->
  <ellipse id="halo-measure"   cx="550" cy="195" rx="70" ry="22" fill="#4488cc" opacity="0" filter="url(#haloGlow)"/>
  <ellipse id="halo-detect"    cx="810" cy="400" rx="55" ry="22" fill="#4488cc" opacity="0" filter="url(#haloGlow)"/>
  <ellipse id="halo-resolve"   cx="550" cy="605" rx="60" ry="22" fill="#4488cc" opacity="0" filter="url(#haloGlow)"/>
  <ellipse id="halo-implement" cx="290" cy="400" rx="70" ry="22" fill="#4488cc" opacity="0" filter="url(#haloGlow)"/>

  <!-- Stage badges -->
  <g id="badge-measure" transform="translate(550,195)">
    <rect x="-55" y="-16" width="110" height="32" rx="16" fill="#4488cc" fill-opacity="0.12" stroke="#4488cc" stroke-width="1.5"/>
    <text x="0" y="5" font-size="12" fill="#fff" text-anchor="middle" font-weight="500" letter-spacing="1.5">MEASURE</text>
  </g>
  <g id="badge-detect" transform="translate(810,400)">
    <rect x="-46" y="-16" width="92" height="32" rx="16" fill="#4488cc" fill-opacity="0.12" stroke="#4488cc" stroke-width="1.5"/>
    <text x="0" y="5" font-size="12" fill="#fff" text-anchor="middle" font-weight="500" letter-spacing="1.5">DETECT</text>
  </g>
  <g id="badge-resolve" transform="translate(550,605)">
    <rect x="-50" y="-16" width="100" height="32" rx="16" fill="#4488cc" fill-opacity="0.12" stroke="#4488cc" stroke-width="1.5"/>
    <text x="0" y="5" font-size="12" fill="#fff" text-anchor="middle" font-weight="500" letter-spacing="1.5">RESOLVE</text>
  </g>
  <g id="badge-implement" transform="translate(290,400)">
    <rect x="-60" y="-16" width="120" height="32" rx="16" fill="#4488cc" fill-opacity="0.12" stroke="#4488cc" stroke-width="1.5"/>
    <text x="0" y="5" font-size="12" fill="#fff" text-anchor="middle" font-weight="500" letter-spacing="1.5">IMPLEMENT</text>
  </g>

  <!-- ==================== CONNECTIONS (below nodes) ==================== -->

  <!-- Stage 2: Measurement — all 10 pairwise -->
  <line x1="550" y1="305" x2="640" y2="371" class="conn-measure"/>
  <line x1="550" y1="305" x2="609" y2="477" class="conn-measure"/>
  <line x1="550" y1="305" x2="491" y2="477" class="conn-measure"/>
  <line x1="550" y1="305" x2="460" y2="371" class="conn-measure"/>
  <line x1="640" y1="371" x2="609" y2="477" class="conn-measure"/>
  <line x1="640" y1="371" x2="491" y2="477" class="conn-measure"/>
  <line x1="640" y1="371" x2="460" y2="371" class="conn-measure"/>
  <line x1="609" y1="477" x2="491" y2="477" class="conn-measure"/>
  <line x1="609" y1="477" x2="460" y2="371" class="conn-measure"/>
  <line x1="491" y1="477" x2="460" y2="371" class="conn-measure"/>

  <!-- Stage 3: Decoherence — Specs drifts to ~(375,326) -->
  <g id="decoherence-group">
    <line x1="550" y1="305" x2="375" y2="326" class="conn-red"/>
    <line x1="491" y1="477" x2="375" y2="326" class="conn-red"/>
    <line x1="550" y1="305" x2="640" y2="371" class="conn-ok"/>
    <line x1="640" y1="371" x2="609" y2="477" class="conn-ok"/>
    <line x1="609" y1="477" x2="491" y2="477" class="conn-ok"/>
    <g class="outlier-badge" transform="translate(310,296)">
      <rect x="-40" y="-13" width="80" height="26" rx="13" fill="#ff4444" fill-opacity="0.15"/>
      <text x="0" y="5" font-size="11" fill="#ff6666" text-anchor="middle" font-weight="500">OUTLIER</text>
    </g>
  </g>

  <!-- Stage 5: Implement — all 10 green -->
  <g id="implement-group">
    <line x1="550" y1="305" x2="640" y2="371" class="conn-green"/>
    <line x1="550" y1="305" x2="609" y2="477" class="conn-green"/>
    <line x1="550" y1="305" x2="491" y2="477" class="conn-green"/>
    <line x1="550" y1="305" x2="460" y2="371" class="conn-green"/>
    <line x1="640" y1="371" x2="609" y2="477" class="conn-green"/>
    <line x1="640" y1="371" x2="491" y2="477" class="conn-green"/>
    <line x1="640" y1="371" x2="460" y2="371" class="conn-green"/>
    <line x1="609" y1="477" x2="491" y2="477" class="conn-green"/>
    <line x1="609" y1="477" x2="460" y2="371" class="conn-green"/>
    <line x1="491" y1="477" x2="460" y2="371" class="conn-green"/>
    <g class="coherent-badge" transform="translate(550,400)">
      <rect x="-54" y="-14" width="108" height="28" rx="14" fill="#44dd88" fill-opacity="0.12"/>
      <text x="0" y="5" font-size="13" fill="#44dd88" text-anchor="middle" font-weight="400">COHERENT</text>
    </g>
  </g>

  <!-- ==================== ARTIFACT NODES (on top) ==================== -->

  <!-- Code — top -->
  <g id="node-code">
    <circle cx="550" cy="305" r="28" class="node-circle" stroke="#4488cc" filter="url(#glow)"/>
    <text x="550" y="311" class="node-icon" font-size="16" fill="#4488cc">{}</text>
    <text x="550" y="348" class="node-label">Code</text>
  </g>

  <!-- Tests — top-right -->
  <g id="node-tests">
    <circle cx="640" cy="371" r="28" class="node-circle" stroke="#44cc88" filter="url(#glow)"/>
    <text x="640" y="377" class="node-icon" font-size="15" fill="#44cc88">&#10003;</text>
    <text x="672" y="404" class="node-label" text-anchor="start">Tests</text>
  </g>

  <!-- Observability — bottom-right -->
  <g id="node-obs">
    <circle cx="609" cy="477" r="28" class="node-circle" stroke="#44aacc" filter="url(#glow)"/>
    <text x="609" y="483" class="node-icon" font-size="16" fill="#44aacc">&#9678;</text>
    <text x="642" y="510" class="node-label" text-anchor="start">Observability</text>
  </g>

  <!-- Context — bottom-left -->
  <g id="node-context">
    <circle cx="491" cy="477" r="28" class="node-circle" stroke="#8866cc" filter="url(#glow)"/>
    <text x="491" y="483" class="node-icon" font-size="16" fill="#8866cc">&#9883;</text>
    <text x="458" y="510" class="node-label" text-anchor="end">Context</text>
  </g>

  <!-- Specs — top-left (drifts during decoherence) -->
  <g id="specs-drift">
    <g id="node-specs-g">
      <circle id="specs-circle" cx="460" cy="371" r="28" class="node-circle" stroke="#cc8844" filter="url(#glow)"/>
      <text x="460" y="377" class="node-icon" font-size="16" fill="#cc8844">&#9776;</text>
      <text x="428" y="404" class="node-label" text-anchor="end">Specs</text>
    </g>
  </g>

  <!-- ==================== STAGE 4: RESOLUTION (below Resolve badge) ==================== -->
  <g id="resolution-group">
    <!-- Human/Agent icon -->
    <g transform="translate(550,650)">
      <circle cx="0" cy="-12" r="10" fill="none" stroke="#aabbcc" stroke-width="1.2"/>
      <path d="M-12,8 Q0,0 12,8" fill="none" stroke="#aabbcc" stroke-width="1.2"/>
    </g>
    <text x="550" y="674" font-size="10" fill="#667788" text-anchor="middle">Human / Agent decides</text>

    <!-- Path A -->
    <path d="M390,692 C425,680 475,680 510,692" class="path-a"
      stroke="#66aadd" stroke-width="1.2" fill="none" marker-end="url(#arrowBlue)"/>
    <text x="450" y="710" class="path-label" font-size="10">A: Outlier &#8594; Cloud</text>

    <!-- Path B -->
    <path d="M590,692 C625,680 675,680 710,692" class="path-b"
      stroke="#66aadd" stroke-width="1.2" fill="none" marker-end="url(#arrowBlue)"/>
    <text x="650" y="710" class="path-label" font-size="10">B: Cloud &#8594; Outlier</text>
  </g>

  <!-- ==================== FOOTER ==================== -->
  <line x1="250" y1="730" x2="850" y2="730" stroke="#1a2233" stroke-width="1"/>
  <text x="550" y="750" font-size="10" fill="#3a4a5a" text-anchor="middle" letter-spacing="1">
    No single source of truth — quality emerges from alignment between all artifacts telling the same story
  </text>
</svg>